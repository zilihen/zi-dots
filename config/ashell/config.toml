[appearance]

primary_color = "#7aa2f7"
success_color = "#9ece6a"
text_color = "#a9b1d6"

workspace_colors = [ "#7aa2f7", "#9ece6a" ]

[appearance.danger_color]
base = "#f7768e"
weak = "#e0af68"

[appearance.background_color]
base = "#1a1b26"
weak = "#24273a"
strong = "#414868"

[appearance.secondary_color]
base = "#0c0d14"

[modules]
left = [  "Workspaces", "WindowTitle"]
center = [ "Tempo", "AppLauncher"]
right = [ ["Tray"], ["SystemInfo"], [ "Privacy", "Settings" ], ["sway"]]


[[CustomModule]]
name = "sway"
icon = ""
command = "swaync-client -t -sw"
listen_cmd = "swaync-client -swb"
icons.'dnd.*' = ""
alert = ".*notification"

[[CustomModule]]
name = "AppLauncher"
icon = "󱗼"
command = "hyprlauncher"

[window_title]
mode = "Class"
truncate_title_after_length = 50